<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Balance Gaming FL — Signage</title>
  <meta name="theme-color" content="#0e0f13" />
  <meta name="robots" content="noindex" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <!-- Plain <link> tags so styles apply reliably on every kiosk browser
       (document.write-injected CSS didn't apply on one of the TVs). Freshness
       comes from the hourly self-reload + the JS cache-buster below. -->
  <link rel="stylesheet" href="assets/brand.css?v=3" />
  <link rel="stylesheet" href="assets/signage.css?v=3" />
  <style>
    /* Inline hard-caps. Some kiosk media players cache the external stylesheet
       and ignore ?v= cache-busting, but they DO re-download this HTML (it's the
       CMS content URL), so these inline rules always take effect. */
    html, body { margin: 0 !important; padding: 0 !important; }
    .sg-corner-qr { width: clamp(88px, 8vw, 150px) !important; right: 0 !important; bottom: 0 !important; }
    .sg-corner-qr svg, .sg-corner-qr img { width: 100% !important; height: auto !important; max-width: 150px !important; }
    /* Event spotlight: bigger image + tighter gap so wide banners fill the panel
       instead of floating small with the info pushed far right. */
    .sg-r-event.has-img { gap: 2vw !important; }
    .sg-re-img { flex: 0 0 50% !important; max-height: 72vh !important; }
    .sg-re-img img { max-height: 72vh !important; }
    .sg-re-name { font-size: clamp(34px, 4.4vw, 76px) !important; margin: 1.2vh 0 !important; }
    .sg-re-kick { font-size: clamp(15px, 1.7vw, 27px) !important; }
    .sg-re-when { font-size: clamp(16px, 1.8vw, 30px) !important; }
    .sg-re-meta { font-size: clamp(17px, 1.9vw, 32px) !important; }
  </style>
</head>
<body class="signage" data-screen="main">
  <!-- In-store signage for the shop TVs (replaces DakBoard).
       ?screen=main      → 75" landscape: events left, live event board right
       ?screen=entrance  → 40" portrait: events + scan-to-register QR -->
  <div class="sg-design">
    <header class="sg-header">
      <div class="sg-brand">
        <img class="sg-logo" src="assets/logo.png" alt="Balance Gaming FL" />
        <span class="sg-brandname">Balance Gaming FL</span>
      </div>
      <div class="sg-headright">
        <span class="sg-live" id="sgLive" hidden><span class="sg-livedot"></span> Live now</span>
        <div class="sg-clock" id="sgClock"></div>
      </div>
    </header>

    <main class="sg-body">
      <section class="sg-left">
        <h2 class="sg-h">Upcoming Events</h2>
        <div class="sg-events" id="sgEvents"></div>
      </section>

      <section class="sg-right" id="sgRight"></section>

      <aside class="sg-qr-col">
        <h2 class="sg-h">Scan to Register</h2>
        <div class="sg-qr" id="sgQR"></div>
        <p class="sg-qr-sub">Point your camera here to sign up for tonight's event.</p>
      </aside>
    </main>

    <footer class="sg-ticker" id="sgTicker" hidden></footer>
  </div>

  <script>
    /* Cache-bust the scripts so the unattended TVs always run the latest build. */
    (function () {
      var t = Date.now();
      ["assets/qrcode.js", "assets/app.js", "assets/commander.js", "assets/tournament.js", "assets/signage.js"]
        .forEach(function (src) { document.write('<script src="' + src + '?t=' + t + '"><\/script>'); });
    })();
  </script>
  <script>document.addEventListener("DOMContentLoaded", function () { if (window.Signage) Signage.init(); });</script>
</body>
</html>
