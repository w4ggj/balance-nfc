<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Display Overlay — Balance Gaming FL</title>
  <meta name="robots" content="noindex" />
  <style>
    html, body { margin: 0; height: 100%; background: transparent; }
    #screen {
      display: none; position: fixed; inset: 0;
      width: 100vw; height: 100vh; border: 0; background: transparent;
    }
    body.on #screen { display: block; }
  </style>
</head>
<body>
  <!-- Drop this into your DakBoard design as a full-screen Web Frame.
       Transparent by default (your DakBoard design shows through). When staff
       turn the big-screen toggle on the control panel ON, the TV mirrors the
       live event: Commander → leaderboard, Pokémon tournament → board, a game
       event → that game's page. OFF (or nothing live) = see-through.
       ?demo=1 forces it on for previewing. -->
  <iframe id="screen" title="Live event display" scrolling="no"></iframe>

  <script src="assets/app.js"></script>
  <script>BGF.initDisplay();</script>
</body>
</html>
