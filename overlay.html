<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Display Overlay — Balance Gaming FL</title>
  <meta name="robots" content="noindex" />
  <style>
    html, body { margin: 0; height: 100%; background: transparent; }
    #screen {
      display: none; position: fixed; inset: 0;
      width: 100vw; height: 100vh; border: 0; background: transparent;
    }
    body.on #screen { display: block; }
  </style>
</head>
<body>
  <!-- SUPERSEDED by signage.html?screen=main (the shop TVs run the in-repo
       signage board now, not DakBoard). Kept working for any DakBoard setup:
       it calls the SAME shared BGF.mountEventOverlay logic as signage.html.
       Drop into a DakBoard design as a full-screen Web Frame — transparent by
       default; when the big-screen toggle is ON the TV mirrors the live event
       (Commander → leaderboard, Pokémon tournament → board, game event → that
       game's page). OFF (or nothing live) = see-through. ?demo=1 to preview. -->
  <iframe id="screen" title="Live event display" scrolling="no"></iframe>

  <script>
    // Signage runs unattended on the DakBoard for days, so it must stay current
    // on its own. Load app.js with a cache-buster (always fresh code), and
    // reload the whole page hourly so future updates reach the TV automatically.
    (function () {
      var s = document.createElement("script");
      s.src = "assets/app.js?t=" + Date.now();
      s.onload = function () { if (window.BGF && BGF.initDisplay) BGF.initDisplay(); };
      document.head.appendChild(s);
      setTimeout(function () { location.reload(); }, 60 * 60 * 1000);
    })();
  </script>
</body>
</html>
