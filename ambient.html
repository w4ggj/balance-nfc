<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Balance Gaming FL — Ambient</title>
  <meta name="robots" content="noindex" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <!-- Fully self-contained: inline CSS + JS, canvas 2D animation, no external
       deps, no clamp()/modern-only CSS — so it runs on old kiosk browsers.
       Silent, loops forever, auto-fits the screen. Point a TV at this. -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #07080b; }
    body {
      color: #f4f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(1200px 800px at 25% 15%, rgba(160,123,255,.10), transparent 60%),
        radial-gradient(1200px 800px at 80% 85%, rgba(200,30,39,.10), transparent 60%),
        #07080b;
    }
    #bg { position: fixed; inset: 0; top: 0; left: 0; width: 100%; height: 100%; display: block; }
    .stage {
      position: fixed; inset: 0; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 6vh 8vw;
    }
    .logo { height: 30vh; max-height: 380px; width: auto; margin-bottom: 3vh;
      filter: drop-shadow(0 12px 36px rgba(200,30,39,.4)); }
    .brand { font-size: 3.4vw; font-weight: 900; letter-spacing: -.01em; opacity: .92; }
    .line {
      margin-top: 4vh; font-size: 3.6vw; font-weight: 800; line-height: 1.3;
      max-width: 20ch; min-height: 3.6em; color: #eef0f5;
      opacity: 0; transition: opacity 1.4s ease; text-shadow: 0 4px 24px rgba(0,0,0,.5);
    }
    .line.show { opacity: 1; }
    .foot { position: fixed; bottom: 3vh; left: 0; right: 0; text-align: center;
      font-size: 1.4vw; letter-spacing: .18em; text-transform: uppercase; color: #7f8593; }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="stage">
    <img class="logo" src="assets/logo.png" alt="" />
    <div class="brand">Balance Gaming FL</div>
    <div class="line" id="line"></div>
  </div>
  <div class="foot">Trading Cards · Tables · Tournaments</div>

  <script>
  (function () {
    // ---- floating-orb background (soft bokeh) --------------------------
    var c = document.getElementById("bg"), ctx = c.getContext("2d");
    var W, H, DPR, orbs = [];
    var COLORS = ["#c81e27", "#f5c518", "#a07bff", "#34d399", "#ff5a5f", "#17c0d6"];
    function hexA(hex, a) {
      var n = parseInt(hex.slice(1), 16);
      return "rgba(" + ((n >> 16) & 255) + "," + ((n >> 8) & 255) + "," + (n & 255) + "," + a + ")";
    }
    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = c.width = Math.floor(window.innerWidth * DPR);
      H = c.height = Math.floor(window.innerHeight * DPR);
      c.style.width = window.innerWidth + "px";
      c.style.height = window.innerHeight + "px";
    }
    function makeOrbs() {
      orbs = [];
      var n = 34;
      for (var i = 0; i < n; i++) {
        orbs.push({
          x: Math.random() * W, y: Math.random() * H,
          r: (50 + Math.random() * 150) * DPR,
          vx: (Math.random() - 0.5) * 0.22 * DPR,
          vy: (Math.random() - 0.5) * 0.22 * DPR,
          col: COLORS[i % COLORS.length],
          a: 0.05 + Math.random() * 0.09
        });
      }
    }
    function frame() {
      ctx.clearRect(0, 0, W, H);
      ctx.globalCompositeOperation = "lighter"; // additive glow = soft bokeh
      for (var i = 0; i < orbs.length; i++) {
        var o = orbs[i];
        o.x += o.vx; o.y += o.vy;
        if (o.x < -o.r) o.x = W + o.r; else if (o.x > W + o.r) o.x = -o.r;
        if (o.y < -o.r) o.y = H + o.r; else if (o.y > H + o.r) o.y = -o.r;
        var g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
        g.addColorStop(0, hexA(o.col, o.a));
        g.addColorStop(1, hexA(o.col, 0));
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalCompositeOperation = "source-over";
      requestAnimationFrame(frame);
    }
    window.addEventListener("resize", function () { resize(); makeOrbs(); });
    resize(); makeOrbs(); requestAnimationFrame(frame);

    // ---- rotating fun line ---------------------------------------------
    var LINES = [
      "Welcome to Balance Gaming FL.",
      "Trading cards, tables, and tournaments — all under one roof.",
      "New singles hit the case daily.",
      "Pull up a chair and play.",
      "Pokémon · Magic · One Piece · Riftbound — it's all here.",
      "Grab a table. Meet your next rival.",
      "Weekly events for every game — everyone's welcome.",
      "Ask us about upcoming tournaments.",
      "Singles, sealed, sleeves, and decks — we've got you.",
      "Come for the cards, stay for the community.",
      "New to a game? We'll get you started.",
      "Friday nights are for Commander.",
      "Scan a table tag to check in and play.",
      "Balance Martial Arts & Gaming — the tables are always open.",
      "Thanks for hanging out with us."
    ];
    var order = shuffle(LINES.slice()), idx = 0;
    var el = document.getElementById("line");
    function shuffle(a) { for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; } return a; }
    function show() {
      el.textContent = order[idx % order.length];
      el.className = "line show";
      idx++;
      if (idx % order.length === 0) order = shuffle(order);
    }
    function hide() { el.className = "line"; }
    // cycle: visible ~9.5s, gap ~1.5s
    show();
    setInterval(function () { hide(); setTimeout(show, 1500); }, 11000);

    // Unattended: reload hourly so it never drifts / leaks memory.
    setTimeout(function () { location.reload(); }, 60 * 60 * 1000);
  })();
  </script>
</body>
</html>
