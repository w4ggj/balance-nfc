<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commander League Standings — Balance Gaming FL</title>
  <meta name="theme-color" content="#0e0f13" />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="stylesheet" href="assets/brand.css" />
  <link rel="stylesheet" href="assets/commander.css" />
</head>
<body class="commander cl-wall">
  <!-- TV leaderboard for the wall / DakBoard. Aggregate season standings only. -->
  <main id="clBoard"></main>

  <!-- Cache-bust JS so this unattended TV always runs the latest board code,
       and self-reload hourly to pick up new pages. -->
  <script>
    var t = Date.now();
    ["assets/app.js", "assets/commander.js"].forEach(function (src) {
      document.write('<script src="' + src + '?t=' + t + '"><\/script>');
    });
  </script>
  <script>BGFCL.initBoard();
    setTimeout(function () { location.reload(); }, 3600000);</script>
</body>
</html>
